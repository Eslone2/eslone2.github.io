        }
        .side-right {
            width: 42%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: flex-start;
            align-items: center;

            width: 16%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

            font-size: 0.9rem;
            font-weight: bold;
            background: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 2;
            border: 1px solid #cbd5e1;
            white-space: nowrap;
        }
        /* 中央を貫く縦の棒 */
        .vertical-line {
            position: absolute;
            width: 6px;
            height: 52px;
            background: #94a3b8;
            z-index: 1;
            left: 50%;
            transform: translateX(-50%);
        }
        .station-row:first-child .vertical-line { top: 26px; height: 26px; }
        .station-row:last-child .vertical-line { top: 0; height: 26px; }

        .train-indicator {
            position: absolute;
            padding: 4px 10px;
            border-radius: 6px;

            font-weight: bold;
            z-index: 3;

function timeToSeconds(timeStr) {
    if (!timeStr) return null;
    const [h, m] = timeStr.split(':').map(Number);
    return (h * 3600) + (m * 60);
}

// 特定の路線データから現在走っている列車を抽出・進行度を計算する関数
function getActiveTrains(timetables, stationsSeq) {
    const now = new Date();
    const currentSec = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
    let activeTrains = [];

    timetables.forEach(train => {
        const stops = stationsSeq.filter(st => train.stations[st]);
        if (stops.length < 2) return;

        const startSec = timeToSeconds(train.stations[stops[0]]);
        const endSec = timeToSeconds(train.stations[stops[stops.length - 1]]);

        if (currentSec >= startSec && currentSec <= endSec) {
            for (let i = 0; i < stops.length - 1; i++) {
                const currStop = stops[i];
                const nextStop = stops[i+1];
                const sec1 = timeToSeconds(train.stations[currStop]);
                const sec2 = timeToSeconds(train.stations[nextStop]);

                if (currentSec >= sec1 && currentSec <= sec2) {
                    activeTrains.push({
                        id: train.id,
                        type: train.type,
                        from: currStop,
                        to: nextStop,
                        ratio: (currentSec - sec1) / (sec2 - sec1)
                    });
                    break;
                }
            }
        }
    });
    return activeTrains;
}

function updateStatus() {
    // 1. 時計の更新
    const now = new Date();
    document.getElementById('clock').innerText = `現在時刻: ${now.toLocaleTimeString()}`;

    // 2. 上り・下りそれぞれの現在走行中の列車リストを取得
    // 上りは「青森[0] → 八戸[20]」の順
    const activeUpTrains = getActiveTrains(upTimetables, stationOrder);
    // 下りは「八戸[20] → 青森[0]」の順で駅を辿る
    const activeDownTrains = getActiveTrains(downTimetables, [...stationOrder].reverse());

    // 3. ボードのクリアと再生成
    const container = document.getElementById('board-rows');
    container.innerHTML = '';

    // 上（青森）から下（八戸）への駅順でループを回す
    stationOrder.forEach((station, index) => {
        const row = document.createElement('div');
        row.className = 'station-row';
        
        // --- 1. 左側エリア（下り列車の描画エリア） ---
        const leftSide = document.createElement('div');
        leftSide.className = 'side-left';
        
        activeDownTrains.forEach(train => {
            // 下り列車にとって「出発した駅(from)」が現在のループの駅である場合
            if (train.from === station) {
                const indicator = document.createElement('div');
                indicator.className = 'train-indicator';
                indicator.classList.add(train.type.includes('普通') ? 'down-local' : 'down-express');
                
                // 下り列車は「下から上（八戸→青森）」へ進む
                // したがって、fromの駅から見て「上方向（マイナス方向）」にスライドさせる
                const reverseIndex = [...stationOrder].reverse().indexOf(train.from);
                const nextStationInDown = [...stationOrder].reverse()[reverseIndex + 1];

                if (train.to === nextStationInDown) {
                    // 隣の駅へ向かう場合：上に向かって（-48px分）進行度をかける
                    const topOffset = 14 - (train.ratio * 52);
                    indicator.style.top = `${topOffset}px`;
                    indicator.innerText = `${train.id} ◀`;
                    leftSide.appendChild(indicator);
                } else if (reverseIndex < [...stationOrder].reverse().indexOf(train.to)) {
                    // 快速などで通過中の場合
                    const fromIdx = [...stationOrder].reverse().indexOf(train.from);
                    const toIdx = [...stationOrder].reverse().indexOf(train.to);
                    const gap = toIdx - fromIdx;

                    if (station === train.from) {
                        const topOffset = 14 - (train.ratio * 52 * gap);
                        indicator.style.top = `${topOffset}px`;
                        indicator.innerText = `(次:${train.to}) ${train.id} ◀`;
                        leftSide.appendChild(indicator);
                    }
                }
            }
        });
        row.appendChild(leftSide);

        // --- 2. 中央エリア（棒 ＋ 駅名） ---
        const centerBar = document.createElement('div');
        centerBar.className = 'center-bar';
        
        const vLine = document.createElement('div');
        vLine.className = 'vertical-line';
        centerBar.appendChild(vLine);

        const stName = document.createElement('div');
        stName.className = 'station-name';
        stName.innerText = station;
        centerBar.appendChild(stName);
        
        row.appendChild(centerBar);

        // --- 3. 右側エリア（上り列車の描画エリア） ---
        const rightSide = document.createElement('div');
        rightSide.className = 'side-right';
        
        activeUpTrains.forEach(train => {
            // 上り列車にとって「出発した駅(from)」が現在のループの駅である場合
            if (train.from === station) {
                const indicator = document.createElement('div');
                indicator.className = 'train-indicator';
                indicator.classList.add(train.type.includes('普通') ? 'up-local' : 'up-express');
                
                // 上り列車は「上から下（青森→八戸）」へ進む
                // したがって、fromの駅から見て「下方向（プラス方向）」にスライドさせる
                const nextStationInUp = stationOrder[index + 1];

                if (train.to === nextStationInUp) {
                    const topOffset = 14 + (train.ratio * 52);
                    indicator.style.top = `${topOffset}px`;
                    indicator.innerText = `▶ ${train.id}`;
                    rightSide.appendChild(indicator);
                } else if (index < stationOrder.indexOf(train.to)) {
                    // 快速などで通過中の場合
                    const fromIdx = stationOrder.indexOf(train.from);
                    const toIdx = stationOrder.indexOf(train.to);
                    const gap = toIdx - fromIdx;

                    if (station === train.from) {
                        const topOffset = 14 + (train.ratio * 52 * gap);
                        indicator.style.top = `${topOffset}px`;
                        indicator.innerText = `▶ ${train.id} (次:${train.to})`;
                        rightSide.appendChild(indicator);
                    }
                }
            }
        });
        row.appendChild(rightSide);

        container.appendChild(row);
    });
}

// 1秒ごとに全体を再計算して描画アップデート
setInterval(updateStatus, 1000);
updateStatus();
</script>
